<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Fórum</title>
    <link rel="stylesheet" href="style.css">
</head>

<body><script>
function criarTopico() {
    let titulo = document.getElementById("titulo").value;
    let mensagem = document.getElementById("mensagem").value;

    if (titulo == "" || mensagem == "") {
        alert("Preenche tudo!");
        return;
    }

    let post = document.createElement("div");
    post.classList.add("topico");

    post.innerHTML = `
        <h3>${titulo}</h3>
        <p>${mensagem}</p>
    `;

    document.querySelector(".forum").appendChild(post);

    document.getElementById("titulo").value = "";
    document.getElementById("mensagem").value = "";
}
</script>
    
<header>
    <h1>Meu Fórum</h1>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Categorias</a>
    <a href="#">Criar tópico</a>

    <!-- BOTÃO DISCORD -->
    <a class="discord-btn" href="https://discord.gg/ZV5S9B4mPf" target="_blank">
        🎮 Entrar no Discord
    </a>
</nav>

<main>

    <section class="forum">
        <h2>Últimos tópicos</h2>

        <div class="topico">
            <h3>Título do tópico</h3>
            <p>Mensagem do usuário aqui...</p>
        </div>

    </section>
    <section class="criar-topico">
    <h2>Criar tópico</h2>

    <input type="text" id="titulo" placeholder="Título do tópico">
    <br><br>

    <textarea id="mensagem" placeholder="Mensagem"></textarea>
    <br><br>

    <button onclick="criarTopico()">Postar</button>
</section>

</main>

<footer>
    <p>Meu fórum © 2026</p>
</footer>

</body>
</html>
