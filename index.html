<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎮 RushMC Fórum</title>

    <link rel="icon" href="imagerushmc.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎮 RushMC Fórum</h1>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Categorias</a>
    <a href="#">Criar tópico</a>

    <a class="discord-btn" href="https://discord.gg/ZV5S9B4mPf" target="_blank">
        🎮 Entrar no Discord
    </a>
</nav>

<main>

<section class="criar-topico">
    <h2>Criar tópico</h2>

    <input type="text" id="nome" placeholder="Seu nome">

    <select id="categoria">
        <option value="🎮 Jogos">🎮 Jogos</option>
        <option value="💬 Geral">💬 Geral</option>
        <option value="🆘 Ajuda">🆘 Ajuda</option>
    </select>

    <input type="text" id="titulo" placeholder="Título do tópico">

    <textarea id="mensagem" placeholder="Mensagem"></textarea>

    <button onclick="criarTopico()">Postar</button>
</section>

<section class="forum">
    <h2>Últimos tópicos</h2>

    <div class="topico">
        <h3>🎮 Bem-vindo!</h3>
        <small>Por: Sistema</small>
        <p>Seu fórum está funcionando 🔥</p>
    </div>

</section>

</main>

<footer>
    <p>RushMC Fórum © 2026</p>
</footer>

<script src="script.js"></script>

</body>
</html>
