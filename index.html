<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Fórum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="topo">
        <h1>Meu Fórum</h1>
        <nav>
            <a href="#topo">Início</a>
            <a href="#secao-ultimos-topicos">Categorias</a>
            <a href="#criar-topico-ancora">Criar tópico</a>
            <a href="https://discord.gg/ZV5S9B4mPf" target="_blank" class="discord-btn">🎮 Entrar no Discord</a>
        </nav>
    </header>

    <div class="container" style="max-width: 1000px; margin: 30px auto; padding: 0 20px;">
        
        <div class="box-criar" id="criar-topico-ancora" style="background-color: #1c1c1c; border-radius: 8px; padding: 20px; margin-bottom: 40px;">
            <h2>Criar tópico</h2>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="text" id="nome" placeholder="Seu nome">
            </div>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <select id="categoria">
                    <option value="🎮 Jogos">🎮 Jogos</option>
                    <option value="📢 Anúncios">📢 Anúncios</option>
                    <option value="💬 Dúvidas">💬 Dúvidas</option>
                </select>
            </div>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="text" id="titulo" placeholder="Título do tópico">
            </div>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <textarea id="mensagem" placeholder="Mensagem"></textarea>
            </div>
            
            <button class="btn-postar" onclick="criarTopico()" style="background-color: #5865F2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Postar</button>
        </div>

        <h2 id="secao-ultimos-topicos">Últimos tópicos</h2>
        
        <div class="forum">
            
            <div class="topico">
                <h3>🎮 Jogos - Bem-vindo!</h3>
                <small>Por: Sistema</small>
                <p>Seu fórum está funcionando 🔥</p>
                <button onclick="curtir(this)">❤️ Curtir (0)</button>
                <button onclick="this.parentElement.remove(); salvarPosts()">🗑️ Apagar</button>
            </div>

        </div>

        <p style="margin-top: 40px; font-size: 12px; color: #8a8a8a;">Meu fórum &copy; 2026</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
