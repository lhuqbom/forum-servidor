<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Fórum</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Meu Fórum</h1>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Categorias</a>
    <a href="#">Criar tópico</a>

    <a class="discord-btn" href="https://discord.gg/ZV5S9B4mPf" target="_blank">
        🎮 Entrar no Discord
    </a>
</nav>

<main>

    <!-- CRIAR TÓPICO -->
    <section class="criar-topico">
        <h2>Criar tópico</h2>

        <input type="text" id="titulo" placeholder="Título do tópico">
        <br><br>

        <textarea id="mensagem" placeholder="Mensagem"></textarea>
        <br><br>

        <button onclick="criarTopico()">Postar</button>
    </section>

    <!-- FÓRUM -->
    <section class="forum">
        <h2>Últimos tópicos</h2>

        <div class="topico">
            <h3>Bem-vindo!</h3>
            <p>Seu fórum está funcionando 🔥</p>
        </div>

    </section>

</main>

<footer>
    <p>Meu fórum © 2026</p>
</footer>

<!-- SCRIPT -->
<script>
function salvarPosts() {
    let forum = document.querySelector(".forum");
    localStorage.setItem("posts", forum.innerHTML);
}

function carregarPosts() {
    let forum = document.querySelector(".forum");
    let postsSalvos = localStorage.getItem("posts");

    if (postsSalvos) {
        forum.innerHTML += postsSalvos;
    }
}

function criarTopico() {
    let titulo = document.getElementById("titulo").value;
    let mensagem = document.getElementById("mensagem").value;

    if (titulo == "" || mensagem == "") {
        alert("Preenche tudo!");
        return;
    }

    let post = document.createElement("div");
    post.classList.add("topico");

    post.innerHTML = `
        <h3>${titulo}</h3>
        <p>${mensagem}</p>
    `;

    document.querySelector(".forum").appendChild(post);

    document.getElementById("titulo").value = "";
    document.getElementById("mensagem").value = "";

    salvarPosts();
}

window.onload = function() {
    carregarPosts();
}
</script>

</body>
</html>
