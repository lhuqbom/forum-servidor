<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Fórum AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🔥 Meu Fórum AI</h1>
        <nav>
            <a href="#regras-forum">Regras</a>
            <a href="#secao-ultimos-topicos">Tópicos</a>
            <a href="#criar-topico-ancora">Criar Tópico</a>
            <a href="https://discord.gg/ZV5S9B4mPf" target="_blank" class="discord-btn">🎮 Discord</a>
        </nav>
    </header>

    <div class="container">
        
        <!-- Regras -->
        <div class="box-regras" id="regras-forum">
            <h2>📜 Regras do Fórum</h2>
            <ul>
                <li>Respeite todos os membros</li>
                <li>Não faça spam</li>
                <li>Mantenha os tópicos na categoria certa</li>
                <li>Conteúdo NSFW só em tópicos específicos</li>
            </ul>
        </div>

        <!-- Formulário de criação -->
        <div class="box-criar" id="criar-topico-ancora">
            <h2>✍️ Criar Novo Tópico</h2>
            
            <div class="input-group">
                <input type="text" id="nome" placeholder="Seu nome ou nickname">
            </div>
            
            <div class="input-group">
                <select id="categoria">
                    <option value="🎮 Jogos">🎮 Jogos</option>
                    <option value="📢 Anúncios">📢 Anúncios</option>
                    <option value="💬 Dúvidas">💬 Dúvidas</option>
                    <option value="🤖 IA & Tech">🤖 IA & Tech</option>
                </select>
            </div>
            
            <div class="input-group">
                <input type="text" id="titulo" placeholder="Título do tópico">
            </div>
            
            <div class="input-group">
                <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
            </div>
            
            <button class="btn-postar" onclick="criarTopico()">🚀 Postar Tópico</button>
        </div>

        <h2 id="secao-ultimos-topicos">📌 Últimos Tópicos</h2>
        
        <div class="forum" id="forum"></div>

        <p class="footer">Meu Fórum AI © 2026 - Feito com ❤️</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
